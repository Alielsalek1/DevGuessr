name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, "feature/**" ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Fix inotify limit
      run: |
        echo "fs.inotify.max_user_instances=524288" | sudo tee -a /etc/sysctl.conf
        sudo sysctl -p

    - name: Restore dependencies
      run: dotnet restore Techdle.sln

    - name: Build
      run: dotnet build Techdle.sln --no-restore --configuration Debug

    - name: Test
      timeout-minutes: 25
      env:
        ASPNETCORE_ENVIRONMENT: Testing
        DOTNET_ENVIRONMENT: Testing
      run: dotnet test Tests/Techdle.Tests.csproj --no-restore --configuration Debug --verbosity normal --blame-hang --blame-hang-timeout 10m

  publish:
    name: Publish to GHCR
    needs: build-and-test
    # Only publish on pushes to master/main
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        run: |
          echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Backend/API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
